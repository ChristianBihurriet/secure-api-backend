spring.application.name=secure-api-backend

# H2
spring.datasource.url=jdbc:h2:file:./data/secure_db;DB_CLOSE_DELAY=-1;AUTO_SERVER=TRUE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# Consola H2
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# JWT
app.jwt.secret=EstaEsUnaClaveSuperSecretaParaFirmarLosTokensDeMiApi12345678901234567890
app.jwt.expiration-ms=3600000
